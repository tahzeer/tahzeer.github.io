name: check links

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 8 * * 1" # every Monday at 8am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --verbose

      - name: Build site
        run: npm run build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base https://tahzeer.github.io
            --no-progress
            --max-concurrency 8
            --exclude-path 'dist/rss.xml'
            --exclude 'linkedin\.com'
            --accept 200,304,429
            './dist/**/*.html'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
